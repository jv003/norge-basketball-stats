<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="color-scheme" content="light">
<title>Norge Basketball — Offense × Defense Matrix</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Big+Shoulders+Display:wght@600;700;800&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body class="wide">
<div class="wrap">

  <div class="topbar">
    <a class="wordmark" href="index.html" style="text-decoration:none">Norge<span>Basketball</span></a>
    <div class="topbar-right">
      <div class="switcher" id="poolSwitch">
        <button class="active" data-pool="u21">U21</button>
        <button data-pool="nt">National Team</button>
      </div>
    </div>
    <svg class="flag" viewBox="0 0 24 18" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Flag of Norway">
      <rect width="24" height="18" fill="var(--red)"/>
      <rect x="6" width="6" height="18" fill="#FFFFFF"/>
      <rect y="6" width="24" height="6" fill="#FFFFFF"/>
      <rect x="7.4" width="3.2" height="18" fill="var(--navy)"/>
      <rect y="7.4" width="24" height="3.2" fill="var(--navy)"/>
    </svg>
  </div>

  <div class="hero">
    <div>
      <div class="hero-team">Offense × Defense Matrix</div>
      <div class="hero-sub" id="heroSub">Strategy matchups across the whole pool — offenses across, defenses down</div>
    </div>
    <div class="record-block" style="display:flex;gap:10px;align-items:flex-start;flex-wrap:wrap;justify-content:flex-end">
      <select id="metricSel" class="season-select">
        <option value="ppp" selected>PPP — points per possession</option>
        <option value="pps">PPS — points per shot</option>
        <option value="efg">eFG%</option>
        <option value="orbp">ORB%</option>
        <option value="tovp">TOV%</option>
        <option value="stlg">Steals /game</option>
        <option value="blkg">Blocks /game</option>
        <option value="pace">Pace (poss/game)</option>
      </select>
      <div style="display:flex;flex-direction:column;gap:6px;align-items:flex-end">
        <select id="seasonMulti" class="season-multi" multiple size="5"></select>
        <label class="pill-check" style="padding:6px 14px"><input type="checkbox" id="allSeasons" checked> All seasons</label>
      </div>
    </div>
  </div>

  <div class="table-card" style="margin-top:0">
    <div class="card-tab"><div class="notch"></div><span>Competitive — round robin + tournament</span></div>
    <div class="table-scroll">
      <table class="stats-table matrix-table" id="matC"><thead><tr></tr></thead><tbody></tbody></table>
    </div>
  </div>

  <div class="table-card">
    <div class="card-tab"><div class="notch"></div><span>Friendlies</span></div>
    <div class="table-scroll">
      <table class="stats-table matrix-table" id="matF"><thead><tr></tr></thead><tbody></tbody></table>
    </div>
  </div>

  <footer id="footer">Loading…</footer>
</div>

<script src="shared.js"></script>
<script>
  const state = { pool: 'u21', metric: 'ppp' };
  const footer = document.getElementById('footer');
  const seasonMulti = document.getElementById('seasonMulti');
  const allSeasons = document.getElementById('allSeasons');
  const METRIC = {
    ppp:  {label: 'PPP',   f: c => c.pts / c.poss,           d: 2},
    pps:  {label: 'PPS',   f: c => c.spts / c.att,           d: 2},
    efg:  {label: 'eFG%',  f: c => 100 * (c.fgm + 0.5 * c.tpm) / c.fgab, d: 1},
    orbp: {label: 'ORB%',  f: c => 100 * c.orb / (c.orb + c.oppdrb),     d: 1},
    tovp: {label: 'TOV%',  f: c => 100 * c.to / c.poss,      d: 1},
    stlg: {label: 'STL/g', f: c => c.stl / c.games,          d: 1},
    blkg: {label: 'BLK/g', f: c => c.blk / c.games,          d: 1},
    pace: {label: 'Pace',  f: c => c.poss / c.games,         d: 1},
  };

  let DOC = null, K = null;

  function selectedSeasons() {
    if (allSeasons.checked) return null;                    // all
    const set = new Set([...seasonMulti.selectedOptions].map(o => +o.value));
    return set.size ? set : null;
  }

  function fillSeasons() {
    seasonMulti.innerHTML = DOC.seasons.map(s =>
      `<option value="${s}">S${s}</option>`).join('');
    seasonMulti.disabled = allSeasons.checked;
  }

  function buildMatrix(tg) {
    const seasons = selectedSeasons();
    const cells = {};                     // off||def -> sums
    const offT = {}, defT = {};
    for (const r of DOC.rows) {
      const o = {}; K.forEach((k, i) => o[k] = r[i]);
      if (o.tg !== tg) continue;
      if (seasons && !seasons.has(o.season)) continue;
      for (const [store, key] of [[cells, o.off + '||' + o.def],
                                  [offT, o.off], [defT, o.def], [cells, '||']]) {
        const c = store[key] ??= {games:0,pts:0,poss:0,att:0,spts:0,fgm:0,
                                  tpm:0,fgab:0,orb:0,oppdrb:0,to:0,stl:0,blk:0};
        for (const f of Object.keys(c)) c[f] += +o[f] || 0;
      }
    }
    return {cells, offT, defT};
  }

  function renderOne(tableId, tg) {
    const {cells, offT, defT} = buildMatrix(tg);
    const m = METRIC[state.metric];
    const offs = Object.keys(offT).sort((a, b) => offT[b].games - offT[a].games);
    const defs = Object.keys(defT).sort((a, b) => defT[b].games - defT[a].games);
    const head = document.querySelector(`#${tableId} thead tr`);
    const body = document.querySelector(`#${tableId} tbody`);
    if (!offs.length) {
      head.innerHTML = '';
      body.innerHTML = '<tr><td>No games in this cut.</td></tr>';
      return;
    }
    const fmt = c => (c && c.games && c.poss > 0)
      ? `${m.f(c).toFixed(m.d)}<span class="n">(${c.games})</span>`
      : '<span style="opacity:.35">—</span>';
    head.innerHTML = `<th style="text-align:left">Def \\ Off</th>` +
      offs.map(o => `<th>${o}</th>`).join('') + `<th class="tot">All off.</th>`;
    body.innerHTML = defs.map(d =>
      `<tr><td style="text-align:left;font-weight:600">${d}</td>` +
      offs.map(o => `<td>${fmt(cells[o + '||' + d])}</td>`).join('') +
      `<td class="tot">${fmt(defT[d])}</td></tr>`).join('') +
      `<tr class="tot"><td style="text-align:left">All def.</td>` +
      offs.map(o => `<td>${fmt(offT[o])}</td>`).join('') +
      `<td class="tot">${fmt(cells['||'])}</td></tr>`;
  }

  async function render() {
    try {
      DOC = await getTable('matrix', state.pool);
      K = DOC.keys;
      fillSeasons();
      renderOne('matC', 'ntc');
      renderOne('matF', 'ntf');
      document.getElementById('heroSub').textContent =
        `${state.pool === 'u21' ? 'U21' : 'National team'} pool · ` +
        `metric from the OFFENSE's perspective · cells show value (games)`;
      footer.innerHTML = `Updated ${DOC.generated} · ` +
        `<a href="players.html" style="color:inherit">player stats</a> · ` +
        `<a href="index.html" style="color:inherit">leaderboards</a>`;
    } catch (e) {
      footer.textContent = e.message === 'locked'
        ? 'Passphrase required — reload to try again.'
        : `Could not load matrix data (${e.message}).`;
    }
  }

  document.querySelectorAll('#poolSwitch button').forEach(btn =>
    btn.addEventListener('click', () => {
      document.querySelectorAll('#poolSwitch button').forEach(b =>
        b.classList.remove('active'));
      btn.classList.add('active');
      state.pool = btn.dataset.pool;
      render();
    }));
  document.getElementById('metricSel').addEventListener('change', e => {
    state.metric = e.target.value; render();
  });
  seasonMulti.addEventListener('change', render);
  allSeasons.addEventListener('change', () => {
    seasonMulti.disabled = allSeasons.checked; render();
  });
  render();
</script>
</body>
</html>
