<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="color-scheme" content="light">
<title>Norge Basketball — All-Time Player Stats</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Big+Shoulders+Display:wght@600;700;800&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body class="wide">
<div class="wrap">

  <div class="topbar">
    <a class="wordmark" href="index.html" style="text-decoration:none">Norge<span>Basketball</span></a>
    <div class="topbar-right" style="display:flex;gap:12px;align-items:center">
      <a href="matrix.html" class="pill-check" style="text-decoration:none">Tactic Analysis</a>
      <div class="switcher" id="teamSwitch">
        <button class="active" data-team="u21">U21</button>
        <button data-team="nt">National Team</button>
      </div>
    </div>
    <svg class="flag" viewBox="0 0 24 18" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Flag of Norway">
      <rect width="24" height="18" fill="var(--red)"/>
      <rect x="6" width="6" height="18" fill="#FFFFFF"/>
      <rect y="6" width="24" height="6" fill="#FFFFFF"/>
      <rect x="7.4" width="3.2" height="18" fill="var(--navy)"/>
      <rect y="7.4" width="24" height="3.2" fill="var(--navy)"/>
    </svg>
  </div>

  <div class="hero">
    <div>
      <div class="hero-team" id="heroTeam">All-Time Player Stats</div>
      <div class="hero-sub" id="heroSub">Every player, every ingested season</div>
    </div>
    <div class="record-block" style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;justify-content:flex-end">
      <div class="switcher" id="viewSwitch">
        <button data-view="stats" class="active">Stats</button>
        <button data-view="core">Core</button>
        <button data-view="def">Defense</button>
      </div>
      <select id="seasonSel" class="season-select"></select>
      <label class="pill-check"><input type="checkbox" id="curOnly"> Current squad</label>
      <div class="switcher" id="modeSwitch">
        <button data-mode="totals" class="active">Totals</button>
        <button data-mode="pergame">Per Game</button>
      </div>
    </div>
  </div>

  <div class="table-card" style="margin-top:0">
    <div class="card-tab"><div class="notch"></div><span id="tableTitle">All-Time Stats</span></div>
    <div class="table-scroll">
      <table class="stats-table" id="statsTable"><thead><tr></tr></thead><tbody></tbody></table>
    </div>
  </div>

  <footer id="footer">Loading…</footer>
</div>

<script src="shared.js"></script>
<script>
  const footer = document.getElementById('footer');
  const heroSub = document.getElementById('heroSub');
  const teamButtons = document.querySelectorAll('#teamSwitch button');
  const modeButtons = document.querySelectorAll('#modeSwitch button');

  let DATA = null;
  const viewButtons = document.querySelectorAll('#viewSwitch button');
  const seasonSel = document.getElementById('seasonSel');
  const state = { team: 'u21', mode: 'totals', view: 'stats', season: 'all' };
  const T_COLS = [
    ['name','Player'], ['gp','GP'], ['min','MIN'], ['pts','PTS'], ['fg','FG'],
    ['fgp','FG%'], ['efg','eFG%'], ['tp','3PT'], ['ft','FT'], ['ast','AST'],
    ['past','pAST'], ['to','TO'], ['ato','A/TO'], ['reb','REB'],
    ['stl','STL'], ['blk','BLK']];
  let tSort = 'pts', tDir = -1;

  // per-table docs via shared.js getTable() — Core/Defense arrive encrypted
  // and decrypt after a once-per-session passphrase prompt.

  function seasonLabel() {
    return state.season === 'all' ? 'All-Time' : `Season ${state.season}`;
  }

  function fillSeasons(seasons) {
    const cur = state.season;
    seasonSel.innerHTML = seasons.map(s =>
      `<option value="${s}">${s === 'all' ? 'All-time' : 'Season ' + s}</option>`).join('');
    seasonSel.value = seasons.includes(cur) ? cur : 'all';
    state.season = seasonSel.value;
  }

  // ── Stats view (players_{team}.json) ──
  async function renderStats() {
    const t = DATA.teams[state.team];
    const doc = await getTable('players', state.team);
    fillSeasons(doc.seasons);
    let rows = (doc.data[state.season] || []).slice();
    rows = applyCur(rows, await curSet(), r => r[F.name]);
    const pg = state.mode === 'pergame';
    document.getElementById('tableTitle').textContent =
      `${seasonLabel()} Stats — ${t.team}${pg ? ' · per game' : ' · totals'}`;
    heroSub.textContent =
      `${t.team} · ${rows.length} players · all games`;

    rows.sort((a, b) => {
      let av = tMetric(a, tSort), bv = tMetric(b, tSort);
      if (pg && tSort !== 'name' && !['fgp','efg','ato'].includes(tSort)) {
        av = a[F.gp] ? av/a[F.gp] : -1; bv = b[F.gp] ? bv/b[F.gp] : -1;
      }
      if (typeof av === 'string') return tDir * av.localeCompare(bv);
      return tDir * (av - bv) || b[F.gp] - a[F.gp];
    });

    document.querySelector('#statsTable thead tr').innerHTML = T_COLS.map(([k, l]) =>
      `<th data-k="${k}" class="${k === tSort ? 'sorted' : ''}">${l}${
        k === tSort ? (tDir < 0 ? ' ▾' : ' ▴') : ''}</th>`).join('');

    document.querySelector('#statsTable tbody').innerHTML = rows.map(r =>
      `<tr><td class="name-click" data-p="${r[F.name]}">${r[F.name]}</td>${
        statCells(r, pg)}</tr>`).join('') ||
      '<tr><td colspan="16">No data for this season.</td></tr>';

    document.querySelectorAll('#statsTable td.name-click').forEach(td =>
      td.onclick = () => showPlayer(state.team, td.dataset.p));
    wireSort(k => { tSort = k; }, () => tSort, d => { tDir = d; }, () => tDir);
  }

  // ── Core view (core_{team}.json — advanced on-floor, competitive only) ──
  const C_COLS = ['Player','GP','MIN','PG%','SG%','SF%','PF%','C%','+/- On',
    'On-Off','ORB%','DRB%','TRB%','AST%','USG%','TOV%','STL%','BLK%','TS%',
    'FTr','3PAr'];
  let cSort = 2, cDir = -1;
  async function renderCore() {
    const t = DATA.teams[state.team];
    const doc = await getTable('core', state.team);
    fillSeasons(doc.seasons);
    let rows = (doc.data[state.season] || []).slice();
    rows = applyCur(rows, await curSet(), r => r[0]);
    document.getElementById('tableTitle').textContent =
      `${seasonLabel()} Advanced — ${t.team} · competitive NT games only`;
    heroSub.textContent = `${t.team} · on-floor rates (friendlies excluded)`;
    rows.sort((a, b) => cSort === 0
      ? cDir * String(a[0]).localeCompare(b[0])
      : cDir * ((a[cSort] ?? -1e9) - (b[cSort] ?? -1e9)));
    document.querySelector('#statsTable thead tr').innerHTML = C_COLS.map((l, i) =>
      `<th data-k="${i}" class="${i === cSort ? 'sorted' : ''}">${l}${
        i === cSort ? (cDir < 0 ? ' ▾' : ' ▴') : ''}</th>`).join('');
    const f = x => x == null ? '—' : x;
    const sgn = x => x == null ? '—' : (x > 0 ? '+' : '') + x;
    document.querySelector('#statsTable tbody').innerHTML = rows.map(r =>
      `<tr><td>${r[0]}</td><td>${r[1]}</td><td>${r[2]}</td>` +
      r.slice(3, 8).map(x => `<td>${x == null || x === 0 ? '—' : x + '%'}</td>`).join('') +
      `<td><b>${sgn(r[8])}</b></td><td><b>${sgn(r[9])}</b></td>` +
      r.slice(10, 19).map(x => `<td>${f(x)}</td>`).join('') +
      `<td>${f(r[19])}</td><td>${f(r[20])}</td></tr>`).join('') ||
      '<tr><td colspan="21">No competitive-game data for this season.</td></tr>';
    wireSort(k => { cSort = +k; }, () => cSort, d => { cDir = d; }, () => cDir);
  }

  // ── Defense view (defense_{team}.json — xDFG + grades, competitive) ──
  const D_COLS = ['Player','Grade','Rim','Per','Contested',
    'INS Ct','INS DFG%','INS xDFG%','INS Imp',
    'MID Ct','MID DFG%','MID xDFG%','MID Imp',
    '3PT Ct','3PT DFG%','3PT xDFG%','3PT Imp'];
  const GRADE_RANK = {'F':1,'D-':2,'D':3,'D+':4,'C-':5,'C':6,'C+':7,
    'B-':8,'B':9,'B+':10,'A-':11,'A':12,'A+':13};
  let dSort = 4, dDir = -1;
  async function renderDef() {
    const t = DATA.teams[state.team];
    const doc = await getTable('defense', state.team);
    fillSeasons(doc.seasons);
    let rows = (doc.data[state.season] || []).slice();
    rows = applyCur(rows, await curSet(), r => r[0]);
    document.getElementById('tableTitle').textContent =
      `${seasonLabel()} Defense — ${t.team} · competitive NT games only`;
    heroSub.textContent = `${t.team} · shooters vs their own baselines; ` +
      `grades ranked within the ${state.team === 'u21' ? 'U21' : 'NT'} pool` +
      (state.season === 'all' ? ' (latest-season grade shown)' : '');
    const val = (r, k) => k <= 3
      ? (k === 0 ? r[0] : (GRADE_RANK[r[k]] ?? -1)) : (r[k] ?? -1e9);
    rows.sort((a, b) => dSort === 0
      ? dDir * String(a[0]).localeCompare(b[0])
      : dDir * (val(a, dSort) - val(b, dSort)));
    document.querySelector('#statsTable thead tr').innerHTML = D_COLS.map((l, i) =>
      `<th data-k="${i}" class="${i === dSort ? 'sorted' : ''}">${l}${
        i === dSort ? (dDir < 0 ? ' ▾' : ' ▴') : ''}</th>`).join('');
    const gcell = g => g == null ? '<td>—</td>' :
      `<td style="font-weight:700;color:${(GRADE_RANK[g]||0) >= 11
        ? '#1a7f37' : (GRADE_RANK[g]||0) <= 3 ? 'var(--red)' : 'inherit'}">${g}</td>`;
    const icell = x => x == null ? '<td>—</td>' :
      `<td style="font-weight:600;color:${x <= -3 ? '#1a7f37' : x >= 3
        ? 'var(--red)' : 'inherit'}">${x > 0 ? '+' : ''}${x}</td>`;
    document.querySelector('#statsTable tbody').innerHTML = rows.map(r => {
      let h = `<tr><td>${r[0]}</td>${gcell(r[1])}${gcell(r[2])}${gcell(r[3])}<td>${r[4]}</td>`;
      for (let z = 0; z < 3; z++) {
        const o = 5 + z * 4;
        h += `<td>${r[o]}</td><td>${r[o+1] ?? '—'}</td><td>${r[o+2] ?? '—'}</td>${icell(r[o+3])}`;
      }
      return h + '</tr>';
    }).join('') ||
      '<tr><td colspan="17">No competitive-game defensive data for this season.</td></tr>';
    wireSort(k => { dSort = +k; }, () => dSort, d => { dDir = d; }, () => dDir);
  }

  function wireSort(setKey, getKey, setDir, getDir) {
    document.querySelectorAll('#statsTable th').forEach(th => th.onclick = () => {
      const k = th.dataset.k;
      if (String(getKey()) === String(k)) setDir(-getDir());
      else { setKey(k); setDir(k === 'name' || k === '0' ? 1 : -1); }
      render();
    });
  }

  // current-squad filter: names from players_{team}.json's `current` list
  async function curSet() {
    if (!document.getElementById('curOnly').checked) return null;
    const doc = await getTable('players', state.team);
    return new Set(doc.current || []);
  }
  const norm = s => String(s).replace(/ /g, ' ');
  function applyCur(rows, set, nameOf) {
    if (!set || !set.size) return rows;
    return rows.filter(r => set.has(norm(nameOf(r))));
  }

  function render() {
    // visibility (not display) so the control row never reflows/jumps
    document.getElementById('modeSwitch').style.visibility =
      state.view === 'stats' ? 'visible' : 'hidden';
    const go = { stats: renderStats, core: renderCore, def: renderDef }[state.view]();
    go.catch(e => {
      document.querySelector('#statsTable tbody').innerHTML =
        e.message === 'locked'
        ? '<tr><td colspan="17">Passphrase required — switch views or reload to try again.</td></tr>'
        : `<tr><td colspan="17">Could not load ${state.view} data (${e.message}) — regenerate with export_norge_stats.py.</td></tr>`;
    });
  }

  teamButtons.forEach(btn => btn.addEventListener('click', () => {
    teamButtons.forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    state.team = btn.dataset.team;
    render();
  }));
  modeButtons.forEach(btn => btn.addEventListener('click', () => {
    modeButtons.forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    state.mode = btn.dataset.mode;
    render();
  }));
  viewButtons.forEach(btn => btn.addEventListener('click', () => {
    viewButtons.forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    state.view = btn.dataset.view;
    render();
  }));
  seasonSel.addEventListener('change', () => {
    state.season = seasonSel.value;
    render();
  });
  document.getElementById('curOnly').addEventListener('change', render);

  fetch('data.json')
    .then(r => { if (!r.ok) throw new Error(r.status); return r.json(); })
    .then(j => {
      DATA = j;
      render();
      footer.innerHTML =
        `Updated ${j.generated} · <a href="index.html" style="color:inherit">← back to leaderboards</a>`;
    })
    .catch(() => {
      footer.textContent = 'Could not load data.json — if opened as a local file, serve over HTTP.';
    });
</script>
</body>
</html>
